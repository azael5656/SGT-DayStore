services:
  # Exponer puertos de BD al host para desarrollo local
  postgres:
    ports:
      - "5432:5432"

  mongo:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"

  # Hot-reload para backend-negocio
  backend-negocio:
    build:
      context: ./backend-negocio
      dockerfile: Dockerfile
      target: builder
    command: npm run start:dev
    volumes:
      - ./backend-negocio:/app
      - /app/node_modules
    ports:
      - "${NEGOCIO_PORT:-3001}:3001"
      - "9229:9229"

  # Hot-reload para backend-iot
  backend-iot:
    build:
      context: ./backend-iot
      dockerfile: Dockerfile
      target: builder
    command: npm run start:dev
    volumes:
      - ./backend-iot:/app
      - /app/node_modules
    ports:
      - "${IOT_PORT:-3002}:3002"
      - "9230:9229"

  # Vite dev server con HMR. Proxy interno apunta al servicio nginx por DNS.
  # Para correr en host (sin Docker) usa: cd frontend-web && npm run dev
  frontend-web:
    image: node:20-alpine
    container_name: sgt-frontend-web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_PROXY_TARGET: http://nginx
    volumes:
      - ./frontend-web:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - nginx
    networks:
      - sgt-network

volumes:
  frontend_node_modules:
