worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream negocio {
        server backend-negocio:3001;
    }

    upstream iot {
        server backend-iot:3002;
    }

    server {
        listen 80;
        server_name localhost;

        # Proxy al microservicio de negocio
        location /api/negocio/ {
            proxy_pass http://negocio/api/negocio/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy al microservicio IoT
        location /api/iot/ {
            proxy_pass http://iot/api/iot/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Socket.io para eventos IoT en tiempo real (sensores, alertas)
        location /socket.io/ {
            proxy_pass http://iot/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # Health check del gateway
        location /health {
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }
    }
}
