# Configuracion del nginx que sirve el bundle de Vite en produccion.
# Solo se usa cuando construimos la imagen con `target: production`.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: cualquier ruta cae en index.html para que React Router
  # pueda resolverla en el cliente.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
