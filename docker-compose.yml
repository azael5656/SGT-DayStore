services:
  # --- Bases de datos ---
  postgres:
    image: postgres:16-alpine
    container_name: sgt-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgt-network

  mongo:
    image: mongo:7
    container_name: sgt-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgt-network

  redis:
    image: redis:7-alpine
    container_name: sgt-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgt-network

  # --- Broker MQTT ---
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sgt-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - sgt-network

  # --- Microservicios ---
  backend-negocio:
    build:
      context: ./backend-negocio
      dockerfile: Dockerfile
    container_name: sgt-backend-negocio
    env_file:
      - .env
    ports:
      - "${NEGOCIO_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sgt-network

  backend-iot:
    build:
      context: ./backend-iot
      dockerfile: Dockerfile
    container_name: sgt-backend-iot
    env_file:
      - .env
    ports:
      - "${IOT_PORT:-3002}:3002"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - sgt-network

  # --- API Gateway ---
  nginx:
    image: nginx:1.25-alpine
    container_name: sgt-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-negocio
      - backend-iot
    networks:
      - sgt-network

volumes:
  pgdata:
  mongodata:
  mosquitto-data:
  mosquitto-log:

networks:
  sgt-network:
    driver: bridge
